<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#F0FDF4" rx="16"/>
  
  <!-- foam board - side view showing foam core -->
  <rect x="80" y="90" width="240" height="120" rx="4" fill="#BBF7D0"/>
  <!-- foam core cross section -->
  <rect x="80" y="100" width="240" height="100" fill="white"/>
  <!-- foam bubbles -->
  <circle cx="130" cy="130" r="8" fill="#D1FAE5"/>
  <circle cx="160" cy="145" r="6" fill="#D1FAE5"/>
  <circle cx="190" cy="125" r="9" fill="#D1FAE5"/>
  <circle cx="220" cy="140" r="7" fill="#D1FAE5"/>
  <circle cx="250" cy="128" r="8" fill="#D1FAE5"/>
  <circle cx="280" cy="145" r="6" fill="#D1FAE5"/>
  <!-- top/bottom skin -->
  <rect x="80" y="90" width="240" height="12" rx="4" fill="#4ADE80"/>
  <rect x="80" y="198" width="240" height="12" rx="4" fill="#4ADE80"/>
  <!-- edge label -->
  <rect x="80" y="90" width="240" height="120" rx="4" fill="none" stroke="#16A34A" stroke-width="3"/>

</svg>