<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#FFFBEB" rx="16"/>
  
  <!-- PS sheet - white rigid board -->
  <rect x="90" y="185" width="220" height="8" rx="3" fill="#E2E8F0"/>
  <rect x="85" y="175" width="220" height="14" rx="3" fill="#CBD5E1"/>
  <rect x="80" y="75" width="240" height="105" rx="6" fill="#F8FAFC"/>
  <rect x="80" y="75" width="240" height="105" rx="6" fill="none" stroke="#94A3B8" stroke-width="3"/>
  <!-- cross-sectional lines showing rigidity -->
  <line x1="80" y1="105" x2="320" y2="105" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="80" y1="135" x2="320" y2="135" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="140" y1="75" x2="140" y2="180" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="200" y1="75" x2="200" y2="180" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="260" y1="75" x2="260" y2="180" stroke="#E2E8F0" stroke-width="2"/>

</svg>