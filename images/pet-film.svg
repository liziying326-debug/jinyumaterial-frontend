<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#F0FDF4" rx="16"/>
  
  <!-- clear film with metallic sheen -->
  <rect x="90" y="70" width="220" height="160" rx="8" fill="#D1FAE5"/>
  <!-- metallic horizontal bands -->
  <rect x="90" y="90" width="220" height="12" fill="#6EE7B7" opacity="0.5"/>
  <rect x="90" y="120" width="220" height="8" fill="#A7F3D0" opacity="0.5"/>
  <rect x="90" y="148" width="220" height="10" fill="#6EE7B7" opacity="0.5"/>
  <rect x="90" y="176" width="220" height="8" fill="#A7F3D0" opacity="0.5"/>
  <rect x="90" y="70" width="220" height="160" rx="8" fill="none" stroke="#10B981" stroke-width="3"/>
  <!-- "PET" embossed look -->
  <text x="200" y="165" font-family="Arial" font-size="32" font-weight="bold" fill="#059669" text-anchor="middle" opacity="0.4">PET</text>

</svg>