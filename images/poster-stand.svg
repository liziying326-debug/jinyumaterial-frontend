<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#F5F3FF" rx="16"/>
  
  <!-- A-frame poster stand -->
  <!-- left panel -->
  <polygon points="90,230 170,60 190,60 110,230" fill="#C4B5FD" stroke="#7C3AED" stroke-width="2"/>
  <!-- right panel -->
  <polygon points="310,230 230,60 210,60 290,230" fill="#C4B5FD" stroke="#7C3AED" stroke-width="2"/>
  <!-- poster on left -->
  <polygon points="95,220 172,68 185,68 108,220" fill="#DDD6FE"/>
  <!-- hinge at top -->
  <rect x="175" y="55" width="50" height="12" rx="6" fill="#7C3AED"/>
  <!-- spread bar -->
  <line x1="150" y1="165" x2="250" y2="165" stroke="#8B5CF6" stroke-width="4"/>
  <!-- rubber feet -->
  <circle cx="95" cy="232" r="7" fill="#6D28D9"/>
  <circle cx="305" cy="232" r="7" fill="#6D28D9"/>

</svg>