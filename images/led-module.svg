<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#0C1A2E" rx="16"/>
  
  <!-- LED module PCB -->
  <rect x="100" y="100" width="200" height="100" rx="8" fill="#064E3B"/>
  <rect x="100" y="100" width="200" height="100" rx="8" fill="none" stroke="#10B981" stroke-width="2"/>
  <!-- LED chips -->
  <rect x="130" y="125" width="28" height="28" rx="4" fill="#FDE68A"/>
  <circle cx="144" cy="139" r="10" fill="white" opacity="0.9"/>
  <circle cx="144" cy="139" r="5" fill="#FEF3C7"/>
  <rect x="186" y="125" width="28" height="28" rx="4" fill="#FDE68A"/>
  <circle cx="200" cy="139" r="10" fill="white" opacity="0.9"/>
  <circle cx="200" cy="139" r="5" fill="#FEF3C7"/>
  <rect x="242" y="125" width="28" height="28" rx="4" fill="#FDE68A"/>
  <circle cx="256" cy="139" r="10" fill="white" opacity="0.9"/>
  <circle cx="256" cy="139" r="5" fill="#FEF3C7"/>
  <!-- connector wires -->
  <rect x="110" y="168" width="8" height="16" fill="#6EE7B7"/>
  <rect x="125" y="168" width="8" height="16" fill="#F87171"/>
  <!-- glow halos -->
  <circle cx="144" cy="139" r="18" fill="#FDE68A" opacity="0.15"/>
  <circle cx="200" cy="139" r="18" fill="#FDE68A" opacity="0.15"/>
  <circle cx="256" cy="139" r="18" fill="#FDE68A" opacity="0.15"/>

</svg>