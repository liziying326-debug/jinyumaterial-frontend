<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#ECFDF5" rx="16"/>
  
  <!-- PP hollow corrugated cross section -->
  <rect x="75" y="80" width="250" height="140" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="3"/>
  <!-- hollow channels -->
  <rect x="75" y="100" width="250" height="100" fill="white"/>
  <!-- corrugation channels -->
  <rect x="95" y="100" width="16" height="100" fill="#D1FAE5"/>
  <rect x="127" y="100" width="16" height="100" fill="#D1FAE5"/>
  <rect x="159" y="100" width="16" height="100" fill="#D1FAE5"/>
  <rect x="191" y="100" width="16" height="100" fill="#D1FAE5"/>
  <rect x="223" y="100" width="16" height="100" fill="#D1FAE5"/>
  <rect x="255" y="100" width="16" height="100" fill="#D1FAE5"/>
  <!-- top/bottom walls -->
  <rect x="75" y="80" width="250" height="22" rx="4" fill="#6EE7B7"/>
  <rect x="75" y="198" width="250" height="22" rx="4" fill="#6EE7B7"/>

</svg>