<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#ECFDF5" rx="16"/>
  
  <!-- promotion table folding -->
  <!-- table top -->
  <rect x="70" y="120" width="260" height="18" rx="4" fill="#6EE7B7"/>
  <!-- legs -->
  <rect x="90" y="138" width="12" height="110" rx="4" fill="#10B981"/>
  <rect x="298" y="138" width="12" height="110" rx="4" fill="#10B981"/>
  <!-- cross bracing -->
  <line x1="102" y1="200" x2="298" y2="200" stroke="#10B981" stroke-width="3"/>
  <line x1="102" y1="180" x2="298" y2="180" stroke="#34D399" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- banner on table front -->
  <rect x="90" y="138" width="220" height="80" rx="2" fill="#D1FAE5"/>
  <rect x="100" y="148" width="200" height="12" rx="3" fill="#059669" opacity="0.5"/>
  <rect x="100" y="170" width="160" height="8" rx="2" fill="#A7F3D0"/>

</svg>