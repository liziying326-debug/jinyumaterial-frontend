<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#1E293B" rx="16"/>
  
  <!-- LED driver/power supply box -->
  <rect x="90" y="90" width="220" height="120" rx="10" fill="#0F172A"/>
  <rect x="90" y="90" width="220" height="120" rx="10" fill="none" stroke="#475569" stroke-width="3"/>
  <!-- ventilation slots -->
  <line x1="110" y1="110" x2="110" y2="150" stroke="#475569" stroke-width="2"/>
  <line x1="122" y1="110" x2="122" y2="150" stroke="#475569" stroke-width="2"/>
  <line x1="134" y1="110" x2="134" y2="150" stroke="#475569" stroke-width="2"/>
  <line x1="146" y1="110" x2="146" y2="150" stroke="#475569" stroke-width="2"/>
  <!-- terminals on right -->
  <rect x="250" y="105" width="50" height="90" rx="4" fill="#1E293B"/>
  <rect x="258" y="115" width="16" height="14" rx="2" fill="#22C55E"/>
  <rect x="280" y="115" width="16" height="14" rx="2" fill="#F87171"/>
  <rect x="258" y="140" width="16" height="14" rx="2" fill="#94A3B8"/>
  <rect x="280" y="140" width="16" height="14" rx="2" fill="#94A3B8"/>
  <!-- LED indicator -->
  <circle cx="240" cy="150" r="8" fill="#22C55E"/>
  <circle cx="240" cy="150" r="4" fill="#4ADE80"/>
  <!-- label -->
  <text x="175" y="175" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">DC OUTPUT</text>

</svg>