<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#1E293B" rx="16"/>
  
  <!-- snap-off utility knife -->
  <!-- handle body -->
  <rect x="80" y="130" width="160" height="40" rx="8" fill="#475569"/>
  <!-- blade -->
  <polygon points="240,130 320,148 240,165" fill="#94A3B8"/>
  <!-- snap lines on blade -->
  <line x1="255" y1="135" x2="265" y2="162" stroke="#475569" stroke-width="1.5"/>
  <line x1="272" y1="138" x2="282" y2="161" stroke="#475569" stroke-width="1.5"/>
  <!-- slider button -->
  <rect x="190" y="126" width="28" height="48" rx="6" fill="#94A3B8"/>
  <rect x="196" y="130" width="16" height="40" rx="4" fill="#CBD5E1"/>
  <!-- handle grip pattern -->
  <line x1="100" y1="130" x2="100" y2="170" stroke="#64748B" stroke-width="2"/>
  <line x1="115" y1="130" x2="115" y2="170" stroke="#64748B" stroke-width="2"/>
  <line x1="130" y1="130" x2="130" y2="170" stroke="#64748B" stroke-width="2"/>

</svg>