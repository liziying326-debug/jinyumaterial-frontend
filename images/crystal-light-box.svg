<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#0C1A2E" rx="16"/>
  
  <!-- crystal/slim light box - glowing -->
  <rect x="90" y="70" width="220" height="160" rx="6" fill="#0F2D5C"/>
  <!-- edge-lit glow -->
  <rect x="90" y="70" width="220" height="160" rx="6" fill="none" stroke="#60A5FA" stroke-width="4"/>
  <!-- inner glow gradient simulation -->
  <rect x="94" y="74" width="212" height="152" rx="4" fill="#1D4ED8" opacity="0.3"/>
  <ellipse cx="200" cy="150" rx="80" ry="55" fill="#3B82F6" opacity="0.3"/>
  <ellipse cx="200" cy="150" rx="50" ry="35" fill="#60A5FA" opacity="0.4"/>
  <!-- crystal edge effects -->
  <line x1="90" y1="70" x2="310" y2="70" stroke="#93C5FD" stroke-width="2"/>
  <line x1="90" y1="230" x2="310" y2="230" stroke="#93C5FD" stroke-width="2"/>
  <!-- mounting holes -->
  <circle cx="110" cy="88" r="5" fill="#1E3A8A"/>
  <circle cx="290" cy="88" r="5" fill="#1E3A8A"/>
  <circle cx="110" cy="212" r="5" fill="#1E3A8A"/>
  <circle cx="290" cy="212" r="5" fill="#1E3A8A"/>

</svg>