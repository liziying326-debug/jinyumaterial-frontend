<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#0C1A2E" rx="16"/>
  
  <!-- flexible LED strip coiled -->
  <!-- coil outer ring -->
  <circle cx="200" cy="155" r="100" fill="none" stroke="#064E3B" stroke-width="18"/>
  <!-- LED chips on strip (outer ring) -->
  <circle cx="200" cy="55" r="7" fill="#FDE68A"/>
  <circle cx="271" cy="84" r="7" fill="#FDE68A"/>
  <circle cx="300" cy="155" r="7" fill="#FDE68A"/>
  <circle cx="271" cy="226" r="7" fill="#FDE68A"/>
  <circle cx="200" cy="255" r="7" fill="#FDE68A"/>
  <circle cx="129" cy="226" r="7" fill="#FDE68A"/>
  <circle cx="100" cy="155" r="7" fill="#FDE68A"/>
  <circle cx="129" cy="84" r="7" fill="#FDE68A"/>
  <!-- glow effect -->
  <circle cx="200" cy="155" r="100" fill="none" stroke="#FDE68A" stroke-width="3" opacity="0.2"/>
  <!-- center hole -->
  <circle cx="200" cy="155" r="45" fill="#0C1A2E"/>
  <!-- lead wires -->
  <line x1="200" y1="55" x2="200" y2="30" stroke="#10B981" stroke-width="3"/>
  <line x1="210" y1="30" x2="190" y2="30" stroke="#10B981" stroke-width="2"/>

</svg>