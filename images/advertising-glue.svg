<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#FFF7ED" rx="16"/>
  
  <!-- glue bottle/tube -->
  <!-- bottle body -->
  <rect x="160" y="90" width="80" height="140" rx="16" fill="#FCD34D"/>
  <!-- bottle neck -->
  <rect x="178" y="70" width="44" height="30" rx="8" fill="#F59E0B"/>
  <!-- nozzle tip -->
  <polygon points="185,70 215,70 205,45 195,45" fill="#D97706"/>
  <!-- cap -->
  <rect x="180" y="40" width="40" height="18" rx="6" fill="#B45309"/>
  <!-- glue drip -->
  <ellipse cx="200" cy="185" rx="15" ry="25" fill="#FDE68A"/>
  <!-- label -->
  <rect x="168" y="110" width="64" height="50" rx="6" fill="white" opacity="0.5"/>
  <line x1="175" y1="122" x2="225" y2="122" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
  <line x1="175" y1="135" x2="215" y2="135" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>

</svg>