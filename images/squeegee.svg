<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#F0F9FF" rx="16"/>
  
  <!-- squeegee tool - angled -->
  <!-- handle -->
  <rect x="250" y="55" width="60" height="30" rx="8" fill="#0284C7" transform="rotate(-30 250 55)"/>
  <!-- body -->
  <rect x="130" y="90" width="140" height="40" rx="6" fill="#0EA5E9"/>
  <!-- rubber blade -->
  <rect x="125" y="128" width="150" height="14" rx="4" fill="#075985"/>
  <!-- rubber edge -->
  <rect x="123" y="138" width="154" height="6" rx="3" fill="#0C4A6E"/>
  <!-- handle grip lines -->
  <line x1="255" y1="75" x2="295" y2="50" stroke="#7DD3FC" stroke-width="2"/>
  <line x1="265" y1="78" x2="305" y2="53" stroke="#7DD3FC" stroke-width="2"/>
  <!-- film being smoothed -->
  <rect x="60" y="144" width="280" height="8" rx="2" fill="#BAE6FD" opacity="0.5"/>
  <path d="M60 144 Q160 138 260 144 L280 144 L280 152 Q160 158 60 152 Z" fill="#E0F2FE" opacity="0.4"/>

</svg>