<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#1E1B4B" rx="16"/>
  
  <!-- perforated window film - half view -->
  <!-- outside (image side) -->
  <rect x="80" y="60" width="240" height="180" rx="8" fill="#4338CA"/>
  <!-- eye/vision graphic -->
  <ellipse cx="200" cy="150" rx="80" ry="50" fill="#6366F1"/>
  <circle cx="200" cy="150" r="28" fill="#312E81"/>
  <circle cx="200" cy="150" r="16" fill="#4F46E5"/>
  <circle cx="200" cy="150" r="8" fill="black"/>
  <circle cx="208" cy="143" r="4" fill="white"/>
  <!-- perforations overlay -->
  <rect x="80" y="60" width="240" height="180" rx="8" fill="url(#dots)" opacity="0.5"/>
  <!-- dot pattern suggestion -->
  <circle cx="100" cy="80" r="3" fill="black" opacity="0.4"/>
  <circle cx="120" cy="80" r="3" fill="black" opacity="0.4"/>
  <circle cx="140" cy="80" r="3" fill="black" opacity="0.4"/>
  <circle cx="160" cy="80" r="3" fill="black" opacity="0.4"/>
  <circle cx="180" cy="80" r="3" fill="black" opacity="0.4"/>

</svg>