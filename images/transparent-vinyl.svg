<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#F0F9FF" rx="16"/>
  
  <!-- transparent film sheet with checkerboard hint -->
  <rect x="80" y="60" width="240" height="180" rx="10" fill="#E0F2FE" opacity="0.6"/>
  <!-- checkerboard corner -->
  <rect x="80" y="60" width="20" height="20" fill="#BAE6FD"/>
  <rect x="100" y="60" width="20" height="20" fill="white"/>
  <rect x="80" y="80" width="20" height="20" fill="white"/>
  <rect x="100" y="80" width="20" height="20" fill="#BAE6FD"/>
  <!-- border -->
  <rect x="80" y="60" width="240" height="180" rx="10" fill="none" stroke="#38BDF8" stroke-width="3"/>
  <!-- peeling corner -->
  <polygon points="280,60 320,60 320,100" fill="#7DD3FC" opacity="0.8"/>
  <polygon points="280,60 320,100 280,100" fill="#E0F2FE"/>
  <line x1="280" y1="60" x2="320" y2="100" stroke="#38BDF8" stroke-width="2"/>

</svg>