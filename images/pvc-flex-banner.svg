<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#FEF3C7" rx="16"/>
  
  <!-- large banner stretched between poles -->
  <rect x="70" y="60" width="10" height="180" rx="5" fill="#92400E"/>
  <rect x="320" y="60" width="10" height="180" rx="5" fill="#92400E"/>
  <!-- banner fabric -->
  <path d="M80 80 Q200 70 320 80 L320 190 Q200 200 80 190 Z" fill="#FCD34D"/>
  <path d="M80 80 Q200 70 320 80 L320 190 Q200 200 80 190 Z" fill="none" stroke="#F59E0B" stroke-width="3"/>
  <!-- ropes top -->
  <line x1="85" y1="60" x2="100" y2="80" stroke="#92400E" stroke-width="2"/>
  <line x1="325" y1="60" x2="312" y2="80" stroke="#92400E" stroke-width="2"/>
  <!-- grommets -->
  <circle cx="100" cy="88" r="6" fill="#B45309" stroke="white" stroke-width="2"/>
  <circle cx="312" cy="88" r="6" fill="#B45309" stroke="white" stroke-width="2"/>
  <circle cx="100" cy="182" r="6" fill="#B45309" stroke="white" stroke-width="2"/>
  <circle cx="312" cy="182" r="6" fill="#B45309" stroke="white" stroke-width="2"/>

</svg>