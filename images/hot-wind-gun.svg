<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#1E293B" rx="16"/>
  
  <!-- heat gun tool -->
  <!-- body barrel -->
  <rect x="100" y="105" width="160" height="50" rx="12" fill="#374151"/>
  <!-- nozzle -->
  <polygon points="260,110 310,118 310,142 260,150" fill="#4B5563"/>
  <!-- air holes -->
  <circle cx="285" cy="122" r="4" fill="#1F2937"/>
  <circle cx="295" cy="130" r="4" fill="#1F2937"/>
  <circle cx="285" cy="138" r="4" fill="#1F2937"/>
