  <!-- heat waves -->
  <path d="M312 118 Q325 118 320 128 Q315 138 328 138" fill="none" stroke="#EF4444" stroke-width="2.5"/>
  <path d="M312 125 Q330 125 325 135 Q320 145 335 145" fill="none" stroke="#F59E0B" stroke-width="2.5"/>

